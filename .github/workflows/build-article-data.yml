name: Build Article Data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          cd build
          npm install
          npm run build

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install angular-cli-ghpages@2
          npx angular-cli-ghpages --no-notfound --dir=dist --branch="gh-pages" --name="The Buildbot" --email="buildbot@agentic.schule"
